const TC=createContext(null);
const ToastProvider=({children})=>{
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type)=>{
    const t=type||'success';
    const id=Date.now();
    setToasts(prev=>[...prev,{id,msg,t}]);
    setTimeout(()=>setToasts(prev=>prev.filter(x=>x.id!==id)),3200);
  },[]);
  const icons={success:'check-circle',error:'alert-circle',warning:'alert-triangle',info:'info'};
  const colors={success:'var(--green)',error:'var(--red)',warning:'var(--yellow)',info:'var(--blue)'};
  return(
    <TC.Provider value={show}>
      {children}
      <div className="tc">
        {toasts.map(t=>(
          <div key={t.id} className={'toast tt'+t.t[0]}>
            <I n={icons[t.t]} s={16} c={colors[t.t]}/>
            <span style={{fontSize:14,color:'var(--text)',flex:1}}>{t.msg}</span>
            <button onClick={()=>setToasts(prev=>prev.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',padding:0}}>
              <I n="x" s={13}/>
            </button>
          </div>
        ))}
      </div>
    </TC.Provider>
  );
};
const useToast=()=>useContext(TC);

// AUTH PAGE
const AuthPage=({mode,setPage,setLoggedIn})=>{
  const [form,setForm]=useState({name:'',email:'',password:'',confirm:'',terms:false});
  const [errs,setErrs]=useState({});
  const [loading,setLoading]=useState(false);
  const [showP,setShowP]=useState(false);
  const [done,setDone]=useState(false);
  const toast=useToast();
  const validate=()=>{
    const e={};
    if(mode==='signup'&&!form.name)e.name='Required';
    if(!form.email||!/\S+@\S+\.\S+/.test(form.email))e.email='Valid email required';
    if(mode!=='forgot'&&!form.password)e.password='Required';
    if(mode==='signup'&&form.password.length<8)e.password='Min 8 characters';
    if((mode==='signup'||mode==='reset')&&form.password!==form.confirm)e.confirm='Passwords do not match';
    if(mode==='signup'&&!form.terms)e.terms='Please accept terms';
    return e;
  };
  const submit=()=>{
    const e=validate();setErrs(e);
    if(Object.keys(e).length)return;
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      if(mode==='forgot'||mode==='reset'){setDone(true);return;}
      toast(mode==='signup'?'Account created! Choose your plan.':'Welcome back! Choose your plan.','success');
      setPage('checkout');
    },1400);
  };
  if(done)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div style={{textAlign:'center',maxWidth:360}}>
        <div style={{width:60,height:60,background:'var(--green-bg)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}><I n={mode==='forgot'?'mail':'check-circle'} s={26} c="var(--green)"/></div>
        <h2 style={{fontSize:22,fontFamily:'var(--ffd)',marginBottom:7}}>{mode==='forgot'?'Check your email':'Password updated'}</h2>
        <p style={{fontSize:14,color:'var(--text3)',marginBottom:20}}>{mode==='forgot'?`Reset link sent to ${form.email}`:'Your password has been reset.'}</p>
        <button className="btn bp" onClick={()=>setPage('login')}>{mode==='forgot'?'Back to login':'Sign in'}</button>
      </div>
    </div>
  );
  const titles={login:'Welcome back',signup:'Start your free trial',forgot:'Reset password',reset:'Set new password'};
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'36px 20px'}}>
      <div style={{width:'100%',maxWidth:400}}>
        <button onClick={()=>setPage('home')} style={{background:'none',border:'none',cursor:'pointer',marginBottom:28,padding:0}}><Logo/></button>
        <h1 style={{fontSize:24,fontFamily:'var(--ffd)',fontWeight:800,marginBottom:4}}>{titles[mode]}</h1>
        <p style={{fontSize:14,color:'var(--text3)',marginBottom:24}}>
          {mode==='login'&&<>No account? <button onClick={()=>setPage('signup')} style={{color:'var(--brand)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)',fontSize:'inherit'}}>Sign up</button></>}
          {mode==='signup'&&<>Have an account? <button onClick={()=>setPage('login')} style={{color:'var(--brand)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)',fontSize:'inherit'}}>Log in</button></>}
          {mode==='forgot'&&"Enter your email and we'll send a reset link."}
          {mode==='reset'&&"Choose a strong new password for your account."}
        </p>
        {(mode==='login'||mode==='signup')&&(
          <>
            <div className="fxc" style={{gap:9,marginBottom:18}}>
              {[['Google','#EA4335'],['Microsoft','#0078D4']].map(([p,c])=>(
                <button key={p} className="btn bs bfw" style={{flex:1,justifyContent:'center'}} onClick={()=>{toast(`Signed in with ${p}! Choose your plan.`,'success');setPage('checkout');}}>
                  <span style={{fontWeight:800,color:c,fontSize:14}}>{p[0]}</span> {p}
                </button>
              ))}
            </div>
            <div className="fxc" style={{gap:10,marginBottom:18}}>
              <div style={{flex:1,height:1,background:'var(--border)'}}/>
              <span style={{fontSize:12,color:'var(--text4)',fontWeight:500}}>OR</span>
              <div style={{flex:1,height:1,background:'var(--border)'}}/>
            </div>
          </>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          {mode==='signup'&&(
            <div className="fg"><label className="fl">Full name</label>
              <input className={`fi${errs.name?' fie':''}`} placeholder="Alex Chen" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
              {errs.name&&<span className="ferr">{errs.name}</span>}
            </div>
          )}
          <div className="fg"><label className="fl">Work email</label>
            <input className={`fi${errs.email?' fie':''}`} type="email" placeholder="you@company.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
            {errs.email&&<span className="ferr">{errs.email}</span>}
          </div>
          {mode!=='forgot'&&(
            <div className="fg">
              <div className="fxb"><label className="fl">{mode==='reset'?'New password':'Password'}</label>
                {mode==='login'&&<button onClick={()=>setPage('forgot')} style={{fontSize:12,color:'var(--brand)',border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)'}}>Forgot?</button>}
              </div>
              <div className="rel">
                <input className={`fi${errs.password?' fie':''}`} type={showP?'text':'password'} placeholder="Min 8 characters" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} style={{paddingRight:38}}/>
                <button onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text3)'}}><I n={showP?'eye-off':'eye'} s={14}/></button>
              </div>
              {errs.password&&<span className="ferr">{errs.password}</span>}
            </div>
          )}
          {(mode==='signup'||mode==='reset')&&(
            <div className="fg"><label className="fl">Confirm password</label>
              <input className={`fi${errs.confirm?' fie':''}`} type="password" placeholder="Re-enter password" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})}/>
              {errs.confirm&&<span className="ferr">{errs.confirm}</span>}
            </div>
          )}
          {mode==='signup'&&(
            <div>
              <div className="fxc" style={{gap:8,alignItems:'flex-start'}}>
                <input type="checkbox" id="terms" checked={form.terms} onChange={e=>setForm({...form,terms:e.target.checked})} style={{marginTop:3,accentColor:'var(--accent)',flexShrink:0}}/>
                <label htmlFor="terms" style={{fontSize:13,color:'var(--text3)',cursor:'pointer',lineHeight:1.5}}>
                  I agree to the <button onClick={()=>setPage('terms')} style={{color:'var(--brand)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)',fontSize:13}}>Terms</button> and <button onClick={()=>setPage('privacy')} style={{color:'var(--brand)',fontWeight:600,border:'none',background:'none',cursor:'pointer',fontFamily:'var(--ff)',fontSize:13}}>Privacy Policy</button>
                </label>
              </div>
              {errs.terms&&<div className="ferr mt2">{errs.terms}</div>}
            </div>
          )}
          <button className="btn bp blg bfw" style={{justifyContent:'center',marginTop:3}} onClick={submit} disabled={loading}>
            {loading?<><Spin s={14}/>Processing...</>:mode==='login'?'Sign in':mode==='signup'?'Create account - choose plan':mode==='forgot'?'Send reset link':'Update password'}
          </button>
        </div>
      </div>
    </div>
  );
};

// CREATE PROJECT WIZARD
const CreateProject=({setPage})=>{
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:'',url:'',depth:3,maxPages:1000,jsRender:false,outputs:['json','markdown'],dest:'download'});
  const [launching,setLaunching]=useState(false);
  const [launched,setLaunched]=useState(false);
  const toast=useToast();
  const up=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleOut=fmt=>up('outputs',form.outputs.includes(fmt)?form.outputs.filter(x=>x!==fmt):[...form.outputs,fmt]);
  const steps=['Project','Crawl','Output','Destination','Review'];
  if(launched)return(
    <div style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center',padding:40,flexDirection:'column',textAlign:'center'}}>
      <div style={{width:64,height:64,background:'var(--green-bg)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',animation:'float 2s ease-in-out infinite'}}><I n="check-circle" s={28} c="var(--green)"/></div>
      <h2 style={{fontSize:22,fontFamily:'var(--ffd)',marginBottom:8}}>Crawl started!</h2>
      <p style={{fontSize:14,color:'var(--text3)',maxWidth:340,marginBottom:24,lineHeight:1.65}}><strong>{form.name||'New project'}</strong> is now crawling. We'll notify you when complete.</p>
      <div className="fxc" style={{gap:10}}>
        <button className="btn bp" onClick={()=>setPage('project-detail')}>View project</button>
        <button className="btn bs" onClick={()=>setPage('projects')}>All projects</button>
      </div>
    </div>
  );
  return(
    <div>
      <TopBar title="Create project" sub="New extraction pipeline" setPage={setPage} back="projects"/>
      <div className="pc ai">
        <div style={{maxWidth:600,margin:'0 auto'}}>
          {/* Stepper */}
          <div className="fxc" style={{marginBottom:28}}>
            {steps.map((l,i)=>(
              <React.Fragment key={l}>
                <div className="fxc" style={{flexDirection:'column',gap:4}}>
                  <div className={`wdot ${i+1<step?'wdd':i+1===step?'wda':'wdp'}`}>{i+1<step?<I n="check" s={12} c="white"/>:i+1}</div>
                  <span style={{fontSize:9,color:i+1<=step?'var(--text2)':'var(--text4)',fontWeight:500,whiteSpace:'nowrap'}}>{l}</span>
                </div>
                {i<steps.length-1&&<div className={`wline${i+1<step?' wldone':''}`} style={{flex:1,marginBottom:14}}/>}
              </React.Fragment>
            ))}
          </div>
          <div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)',marginBottom:16}}>Step {step} of 5 - {steps[step-1]}</div>

          {step===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <h2 style={{fontSize:20,fontFamily:'var(--ffd)'}}>Name your project</h2>
              <div className="fg"><label className="fl">Project name</label><input className="fi" placeholder="e.g. Acme Docs" value={form.name} onChange={e=>up('name',e.target.value)}/></div>
              <div className="fg"><label className="fl">Website URL</label><input className="fi" placeholder="https://docs.example.com" value={form.url} onChange={e=>up('url',e.target.value)} style={{fontFamily:'var(--ffm)',fontSize:13}}/><span style={{fontSize:12,color:'var(--text4)'}}>Root URL to begin crawling from.</span></div>
            </div>
          )}
          {step===2&&(
            <div style={{display:'flex',flexDirection:'column',gap:15}}>
              <h2 style={{fontSize:20,fontFamily:'var(--ffd)'}}>Configure crawl</h2>
              <div className="g2">
                <div className="fg"><label className="fl">Crawl depth</label><select className="fse" value={form.depth} onChange={e=>up('depth',e.target.value)}>{[1,2,3,4,5,10].map(d=><option key={d} value={d}>{d} levels</option>)}</select></div>
                <div className="fg"><label className="fl">Max pages</label><select className="fse" value={form.maxPages} onChange={e=>up('maxPages',e.target.value)}>{[100,500,1000,5000,10000].map(p=><option key={p} value={p}>{p.toLocaleString()}</option>)}</select></div>
              </div>
              <div className="fg"><label className="fl">Include paths <span style={{color:'var(--text4)'}}>opt.</span></label><input className="fi" placeholder="/docs/, /blog/" style={{fontFamily:'var(--ffm)',fontSize:13}}/></div>
              <div className="fg"><label className="fl">Exclude paths <span style={{color:'var(--text4)'}}>opt.</span></label><input className="fi" placeholder="/admin/, /login/" style={{fontFamily:'var(--ffm)',fontSize:13}}/></div>
              {[['jsRender','JavaScript rendering','For React/Vue/Angular SPAs'],['respectRobots','Respect robots.txt','Follow crawl directives (recommended)']].map(([k,l,d])=>(
                <div key={k} className="fxb" style={{padding:'12px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)'}}>
                  <div><div style={{fontSize:13,fontWeight:500}}>{l}</div><div style={{fontSize:12,color:'var(--text3)'}}>{d}</div></div>
                  <label className="tog"><input type="checkbox" checked={!!form[k]} onChange={e=>up(k,e.target.checked)}/><span className="tsl"/></label>
                </div>
              ))}
            </div>
          )}
          {step===3&&(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <h2 style={{fontSize:20,fontFamily:'var(--ffd)'}}>Output formats</h2>
              {[['json','JSON','Full structured data'],['jsonl','JSONL','Line-delimited bulk'],['markdown','Markdown','Clean text for LLMs'],['chunks','Chunks','Pre-split with overlap'],['csv','CSV','Metadata index']].map(([fmt,l,d])=>(
                <div key={fmt} onClick={()=>toggleOut(fmt)} className="fxc" style={{gap:12,padding:'12px 15px',border:`2px solid ${form.outputs.includes(fmt)?'var(--accent)':'var(--border)'}`,borderRadius:'var(--rlg)',cursor:'pointer',background:form.outputs.includes(fmt)?'var(--bg2)':'var(--surface)',transition:'all .14s'}}>
                  <div style={{width:17,height:17,border:`2px solid ${form.outputs.includes(fmt)?'var(--accent)':'var(--border2)'}`,borderRadius:4,background:form.outputs.includes(fmt)?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {form.outputs.includes(fmt)&&<I n="check" s={10} c="white"/>}
                  </div>
                  <div><div style={{fontSize:13,fontWeight:600}}>{l}</div><div style={{fontSize:12,color:'var(--text3)'}}>{d}</div></div>
                </div>
              ))}
            </div>
          )}
          {step===4&&(
            <div style={{display:'flex',flexDirection:'column',gap:11}}>
              <h2 style={{fontSize:20,fontFamily:'var(--ffd)'}}>Destination</h2>
              {[['download','Download only','Export files directly'],['pinecone','Pinecone','Push to your index'],['qdrant','Qdrant','Deliver to collection'],['weaviate','Weaviate','Upload to class'],['pgvector','PGVector','Insert into PostgreSQL'],['endpoint','Custom endpoint','POST to any REST API']].map(([v,l,d])=>(
                <div key={v} onClick={()=>up('dest',v)} className="fxc" style={{gap:11,padding:'12px 15px',border:`2px solid ${form.dest===v?'var(--accent)':'var(--border)'}`,borderRadius:'var(--rlg)',cursor:'pointer',background:form.dest===v?'var(--bg2)':'var(--surface)',transition:'all .14s'}}>
                  <div style={{width:16,height:16,border:`2px solid ${form.dest===v?'var(--accent)':'var(--border2)'}`,borderRadius:'50%',background:form.dest===v?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {form.dest===v&&<div style={{width:5,height:5,background:'white',borderRadius:'50%'}}/>}
                  </div>
                  <div><div style={{fontSize:13,fontWeight:600}}>{l}</div><div style={{fontSize:12,color:'var(--text3)'}}>{d}</div></div>
                </div>
              ))}
            </div>
          )}
          {step===5&&(
            <div style={{display:'flex',flexDirection:'column',gap:15}}>
              <h2 style={{fontSize:20,fontFamily:'var(--ffd)'}}>Review & launch</h2>
              <div className="card" style={{background:'var(--bg2)'}}>
                {[['Project name',form.name||'-'],['Website URL',form.url||'-'],['Max pages',Number(form.maxPages).toLocaleString()],['JS rendering',form.jsRender?'Enabled':'Disabled'],['Outputs',form.outputs.join(', ')||'None'],['Destination',form.dest]].map(([k,v])=>(
                  <div key={k} className="fxb" style={{padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                    <span style={{color:'var(--text3)'}}>{k}</span>
                    <span style={{fontWeight:500,fontFamily:k==='Website URL'?'var(--ffm)':'inherit'}}>{v}</span>
                  </div>
                ))}
              </div>
              <div className="alert aii"><I n="info" s={15} c="var(--blue)"/><span>Consumes up to <strong>{Number(form.maxPages).toLocaleString()} pages</strong> from your quota.</span></div>
            </div>
          )}

          <div className="fxb" style={{marginTop:26,paddingTop:16,borderTop:'1px solid var(--border)'}}>
            <button className="btn bs" onClick={()=>step>1?setStep(s=>s-1):setPage('projects')} disabled={launching}>
              <I n="chevron-left" s={13}/>{step===1?'Cancel':'Back'}
            </button>
            {step<5?(

// MAIN APP
const App=()=>{
  const [page,setPage]=useState('home');
  const [loggedIn,setLoggedIn]=useState(false);

  const publicPages=['home','features','integrations','pricing','enterprise','docs','contact','about','terms','privacy','cookies'];
  const authPages=['login','signup','forgot','reset'];
  const standalonePages=['checkout'];
  const appPages=['dashboard','projects','create-project','project-detail','analytics','billing','team','settings','support','notifications'];

  const isPublicPage=publicPages.includes(page)||authPages.includes(page);
  const isAppPage=appPages.includes(page);
  const isStandalone=standalonePages.includes(page);

  // Redirect to dashboard if logged in and on auth page
  const goPage=(p)=>{
    setPage(p);
    window.scrollTo(0,0);
  };

  return(
    <ToastProvider>
      {/* STANDALONE */}
      {isStandalone&&(
        page==='checkout'&&<Checkout setPage={goPage} setLoggedIn={setLoggedIn}/>
      )}

      {/* PUBLIC / AUTH LAYOUT */}
      {!isStandalone&&isPublicPage&&(
        <div>
          {!authPages.includes(page)&&<PubNav page={page} setPage={goPage} loggedIn={loggedIn}/>}
          {page==='home'&&<HomePage setPage={goPage}/>}
          {page==='features'&&<FeaturesPage setPage={goPage}/>}
          {page==='integrations'&&<IntegrationsPage setPage={goPage}/>}
          {page==='pricing'&&<PricingPage setPage={goPage}/>}
          {page==='enterprise'&&<EnterprisePage setPage={goPage}/>}
          {page==='docs'&&<div style={{display:'flex',flexDirection:'column',minHeight:'calc(100vh - 60px)'}}><Docs setPage={goPage}/></div>}
          {page==='contact'&&<ContactPage setPage={goPage}/>}
          {page==='about'&&(
            <div style={{maxWidth:680,margin:'0 auto',padding:'72px 24px'}}>
              <h1 style={{fontSize:32,fontFamily:'var(--ffd)',marginBottom:14}}>About DataForge AI</h1>
              <p style={{fontSize:15,color:'var(--text3)',lineHeight:1.75}}>DataForge AI was founded in 2024 to solve a critical problem in the AI era: extracting clean, structured data out of websites and into AI pipelines without custom engineering for every project. Our platform handles crawling, cleaning, chunking, and delivering - so AI teams can focus on building remarkable products.</p>
            </div>
          )}
          {page==='terms'&&<SimplePage title="Terms of Service"/>}
          {page==='privacy'&&<SimplePage title="Privacy Policy"/>}
          {page==='cookies'&&<SimplePage title="Cookie Policy"/>}
          {page==='login'&&<AuthPage mode="login" setPage={goPage} setLoggedIn={setLoggedIn}/>}
          {page==='signup'&&<AuthPage mode="signup" setPage={goPage} setLoggedIn={setLoggedIn}/>}
          {page==='forgot'&&<AuthPage mode="forgot" setPage={goPage} setLoggedIn={setLoggedIn}/>}
          {page==='reset'&&<AuthPage mode="reset" setPage={goPage} setLoggedIn={setLoggedIn}/>}
          {!publicPages.includes(page)&&!authPages.includes(page)&&<HomePage setPage={goPage}/>}
        </div>
      )}

      {/* APP LAYOUT */}
      {!isStandalone&&isAppPage&&!loggedIn&&(
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
          <div style={{textAlign:'center',maxWidth:360}}>
            <div style={{width:56,height:56,background:'rgba(212,98,42,.1)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px'}}><I n="lock" s={24} c="var(--brand)"/></div>
            <h2 style={{fontSize:20,fontFamily:'var(--ffd)',marginBottom:8}}>Sign in required</h2>
            <p style={{fontSize:13,color:'var(--text3)',marginBottom:20,lineHeight:1.6}}>Please sign in to access the dashboard.</p>
            <div className="fxc" style={{justifyContent:'center',gap:10}}>
              <button className="btn bp" onClick={()=>goPage('login')}>Sign in</button>
              <button className="btn bs" onClick={()=>goPage('signup')}>Create account</button>
            </div>
          </div>
        </div>
      )}
      {!isStandalone&&isAppPage&&loggedIn&&(
        <div className="app">
          <Sidebar page={page} setPage={goPage} setLoggedIn={setLoggedIn}/>
          <div className="mc2">
            {page==='dashboard'&&<Dashboard setPage={goPage}/>}
            {page==='projects'&&<ProjectsPage setPage={goPage}/>}
            {page==='create-project'&&<CreateProject setPage={goPage}/>}
            {page==='project-detail'&&<ProjectDetail setPage={goPage}/>}
            {page==='analytics'&&<Analytics setPage={goPage}/>}
            {page==='billing'&&<Billing setPage={goPage}/>}
            {page==='team'&&<Team setPage={goPage}/>}
            {page==='settings'&&<Settings setPage={goPage}/>}
            {page==='support'&&<Support setPage={goPage}/>}
            {page==='notifications'&&<NotificationsPage setPage={goPage}/>}
            {page==='docs'&&<div style={{display:'flex',flex:1}}><Docs setPage={goPage}/></div>}
          </div>
        </div>
      )}
    </ToastProvider>
  );
};

const _root=ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App/>);

</script>
