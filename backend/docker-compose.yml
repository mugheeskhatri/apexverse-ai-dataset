version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: apexverse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apexverse}
      POSTGRES_USER: ${POSTGRES_USER:-apexverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apexverse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [apexverse]

  redis:
    image: redis:7-alpine
    container_name: apexverse_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [apexverse]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexverse_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apexverse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-apexverse}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [apexverse]

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: apexverse_frontend
    restart: unless-stopped
    environment:
      BACKEND_SIMPLE_API_BASE_URL: http://backend:8050
    depends_on:
      - backend
    networks: [apexverse]

  nginx:
    image: nginx:1.25-alpine
    container_name: apexverse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks: [apexverse]

volumes:
  postgres_data:
  redis_data:

networks:
  apexverse:
    driver: bridge
